name: JPX取引代金トラッカー

on:
  schedule:
    # 16:10 JST = 07:10 UTC（平日のみ）
    - cron: "10 7 * * 1-5"
  workflow_dispatch:  # 手動実行も可能

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: JPXデータを取得してスプレッドシートに記録
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python jpx_scraper.py
